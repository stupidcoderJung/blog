<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="690" viewBox="0 0 1200 690" role="img" aria-labelledby="title desc">
  <title id="title">큰 파일 한 개와 작은 파일 여러 개를 읽을 때의 네트워크 왕복 비교</title>
  <desc id="desc">큰 파일은 요청 횟수가 적고 데이터를 길게 전송한다. 작은 파일 여러 개는 파일마다 질문과 답이 반복되어 왕복 지연이 쌓인다.</desc>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ea580c"/>
    </marker>
    <style>
      .title { font: 700 34px system-ui, sans-serif; fill: #0f172a; }
      .label { font: 700 24px system-ui, sans-serif; fill: #0f172a; }
      .small { font: 500 18px system-ui, sans-serif; fill: #334155; }
      .tiny { font: 600 16px system-ui, sans-serif; fill: #334155; }
    </style>
  </defs>
  <rect width="1200" height="690" rx="28" fill="#f8fafc"/>
  <text x="600" y="50" text-anchor="middle" class="title">RTT: 질문을 보내고 답을 받기까지의 왕복 시간</text>

  <g transform="translate(55 90)">
    <rect width="520" height="520" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
    <text x="260" y="48" text-anchor="middle" class="label">큰 파일 한 개</text>
    <rect x="32" y="102" width="130" height="72" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="97" y="145" text-anchor="middle" class="label">계산 노드</text>
    <rect x="358" y="102" width="130" height="72" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="423" y="145" text-anchor="middle" class="label">NAS</text>
    <line x1="162" y1="122" x2="355" y2="122" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
    <text x="260" y="108" text-anchor="middle" class="tiny">“파일 주세요”</text>
    <line x1="358" y1="161" x2="165" y2="161" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
    <text x="260" y="190" text-anchor="middle" class="tiny">응답 시작</text>
    <g transform="translate(55 238)">
      <rect x="0" y="0" width="410" height="76" rx="12" fill="#bfdbfe"/>
      <rect x="8" y="8" width="48" height="60" rx="7" fill="#2563eb"/>
      <rect x="64" y="8" width="48" height="60" rx="7" fill="#3b82f6"/>
      <rect x="120" y="8" width="48" height="60" rx="7" fill="#60a5fa"/>
      <rect x="176" y="8" width="48" height="60" rx="7" fill="#3b82f6"/>
      <rect x="232" y="8" width="48" height="60" rx="7" fill="#60a5fa"/>
      <rect x="288" y="8" width="48" height="60" rx="7" fill="#3b82f6"/>
      <rect x="344" y="8" width="58" height="60" rx="7" fill="#60a5fa"/>
    </g>
    <text x="260" y="345" text-anchor="middle" class="small">왕복은 적고, 그 뒤에 데이터가 길게 온다</text>
    <rect x="50" y="390" width="420" height="82" rx="14" fill="#dcfce7"/>
    <text x="260" y="422" text-anchor="middle" class="small">주된 질문: 길이 넓은가?</text>
    <text x="260" y="450" text-anchor="middle" class="small">→ 대역폭(BW)이 중요</text>
  </g>

  <g transform="translate(625 90)">
    <rect width="520" height="520" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
    <text x="260" y="48" text-anchor="middle" class="label">작은 파일 여러 개</text>
    <rect x="32" y="102" width="130" height="72" rx="14" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
    <text x="97" y="145" text-anchor="middle" class="label">계산 노드</text>
    <rect x="358" y="102" width="130" height="72" rx="14" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
    <text x="423" y="145" text-anchor="middle" class="label">NAS</text>
    <g stroke="#ea580c" stroke-width="4">
      <line x1="162" y1="204" x2="355" y2="204" marker-end="url(#arrowOrange)"/>
      <line x1="358" y1="238" x2="165" y2="238" marker-end="url(#arrowOrange)"/>
      <line x1="162" y1="276" x2="355" y2="276" marker-end="url(#arrowOrange)"/>
      <line x1="358" y1="310" x2="165" y2="310" marker-end="url(#arrowOrange)"/>
      <line x1="162" y1="348" x2="355" y2="348" marker-end="url(#arrowOrange)"/>
      <line x1="358" y1="382" x2="165" y2="382" marker-end="url(#arrowOrange)"/>
    </g>
    <text x="260" y="195" text-anchor="middle" class="tiny">파일 1 질문</text>
    <text x="260" y="269" text-anchor="middle" class="tiny">파일 2 질문</text>
    <text x="260" y="341" text-anchor="middle" class="tiny">파일 3 질문</text>
    <rect x="50" y="410" width="420" height="82" rx="14" fill="#fee2e2"/>
    <text x="260" y="442" text-anchor="middle" class="small">주된 질문: 몇 번 왕복하는가?</text>
    <text x="260" y="470" text-anchor="middle" class="small">→ RTT와 호출 수가 중요</text>
  </g>
  <text x="600" y="652" text-anchor="middle" class="small">같은 1GB라도 “한 덩어리”와 “작은 조각 백만 개”는 전혀 다른 일이다</text>
</svg>
