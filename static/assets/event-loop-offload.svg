<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="710" viewBox="0 0 1200 710" role="img" aria-labelledby="title desc">
  <title id="title">이벤트 루프에서 파일 읽기를 직접 수행할 때와 스레드로 넘길 때 비교</title>
  <desc id="desc">위 타임라인은 파일 읽기 동안 다른 작업과 심장박동이 멈춘다. 아래 타임라인은 파일 읽기를 I/O 스레드가 맡아 이벤트 루프가 다른 작업을 계속한다.</desc>
  <defs>
    <style>
      .title { font: 700 34px system-ui, sans-serif; fill: #0f172a; }
      .label { font: 700 23px system-ui, sans-serif; fill: #0f172a; }
      .small { font: 500 18px system-ui, sans-serif; fill: #334155; }
      .lane { font: 600 17px system-ui, sans-serif; fill: #334155; }
    </style>
  </defs>
  <rect width="1200" height="710" rx="28" fill="#f8fafc"/>
  <text x="600" y="50" text-anchor="middle" class="title">한 줄짜리 파일 읽기가 전체 줄을 세울 수 있다</text>

  <rect x="55" y="90" width="1090" height="245" rx="20" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/>
  <text x="600" y="128" text-anchor="middle" class="label">파일 읽기를 이벤트 루프가 직접 맡을 때</text>
  <text x="80" y="185" class="lane">이벤트 루프</text>
  <rect x="220" y="157" width="160" height="55" rx="10" fill="#dbeafe"/>
  <text x="300" y="191" text-anchor="middle" class="small">작업 A 시작</text>
  <rect x="380" y="157" width="330" height="55" rx="10" fill="#fecaca" stroke="#dc2626" stroke-width="2"/>
  <text x="545" y="191" text-anchor="middle" class="small">NAS 파일 읽기 · 모두 기다림</text>
  <rect x="710" y="157" width="145" height="55" rx="10" fill="#dbeafe"/>
  <text x="782" y="191" text-anchor="middle" class="small">작업 B</text>
  <rect x="855" y="157" width="145" height="55" rx="10" fill="#dbeafe"/>
  <text x="927" y="191" text-anchor="middle" class="small">작업 C</text>
  <text x="80" y="265" class="lane">heartbeat</text>
  <circle cx="250" cy="261" r="11" fill="#16a34a"/>
  <circle cx="350" cy="261" r="11" fill="#16a34a"/>
  <line x1="361" y1="261" x2="730" y2="261" stroke="#dc2626" stroke-width="5" stroke-dasharray="12 10"/>
  <circle cx="742" cy="261" r="11" fill="#dc2626"/>
  <text x="550" y="302" text-anchor="middle" class="small">예정된 확인 시각이 늦어진다</text>

  <rect x="55" y="365" width="1090" height="285" rx="20" fill="#f0fdf4" stroke="#16a34a" stroke-width="3"/>
  <text x="600" y="403" text-anchor="middle" class="label">파일 읽기를 I/O 스레드에 맡길 때</text>
  <text x="80" y="465" class="lane">이벤트 루프</text>
  <rect x="220" y="437" width="150" height="55" rx="10" fill="#dbeafe"/>
  <text x="295" y="471" text-anchor="middle" class="small">작업 A</text>
  <rect x="370" y="437" width="145" height="55" rx="10" fill="#dbeafe"/>
  <text x="442" y="471" text-anchor="middle" class="small">작업 B</text>
  <rect x="515" y="437" width="145" height="55" rx="10" fill="#dbeafe"/>
  <text x="587" y="471" text-anchor="middle" class="small">작업 C</text>
  <rect x="660" y="437" width="210" height="55" rx="10" fill="#dcfce7"/>
  <text x="765" y="471" text-anchor="middle" class="small">A 결과 처리</text>
  <text x="80" y="535" class="lane">I/O 스레드</text>
  <rect x="370" y="507" width="290" height="55" rx="10" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
  <text x="515" y="541" text-anchor="middle" class="small">NAS 파일 읽기</text>
  <text x="80" y="605" class="lane">heartbeat</text>
  <g fill="#16a34a">
    <circle cx="250" cy="600" r="11"/>
    <circle cx="350" cy="600" r="11"/>
    <circle cx="450" cy="600" r="11"/>
    <circle cx="550" cy="600" r="11"/>
    <circle cx="650" cy="600" r="11"/>
    <circle cx="750" cy="600" r="11"/>
  </g>
  <text x="925" y="541" text-anchor="middle" class="small">기다림은 사라지지 않는다.</text>
  <text x="925" y="570" text-anchor="middle" class="small">다른 일을 막지 않을 뿐이다.</text>
  <text x="600" y="686" text-anchor="middle" class="small">운영 이슈에서 발견한 “async인데 실제로는 직렬”인 흐름을 공개용으로 다시 그린 그림</text>
</svg>
